services:
  - type: web
    name: ckd-anti-aging-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SESSION_SECRET
        generateValue: true
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: API_NINJAS_KEY
        sync: false
