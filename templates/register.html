{% extends "base.html" %}
{% block content %}
<div class="min-h-[100dvh] bg-white flex flex-col p-6 relative overflow-hidden font-sans selection:bg-[#064e3b]/20">

  <div class="absolute top-0 right-0 w-[800px] h-[800px] bg-slate-50 rounded-full blur-3xl -z-10 translate-x-1/3 -translate-y-1/3"></div>
  <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-emerald-50/50 rounded-full blur-3xl -z-10 -translate-x-1/3 translate-y-1/3"></div>

  <div class="flex-1 flex flex-col justify-center max-w-md w-full mx-auto fade-in-up py-10">

    <div class="mb-10 text-center flex flex-col items-center">
      <div class="relative group mb-6 mt-4">
        <div class="absolute inset-0 bg-emerald-500 blur-xl opacity-30 rounded-full animate-pulse-slow"></div>
        {% if app_settings.logo_path %}
        <div class="w-20 h-20 rounded-[24px] relative z-10 animate-float shadow-[0_10px_30px_rgba(6,78,59,0.4)] overflow-hidden border-2 border-white/30">
            <img src="{{ app_settings.logo_path }}" alt="{{ app_settings.app_name }}" class="w-full h-full object-cover">
        </div>
        {% else %}
        <div class="w-20 h-20 bg-[#064e3b] rounded-[24px] flex items-center justify-center relative z-10 animate-float shadow-[0_10px_30px_rgba(6,78,59,0.4)] border border-[#064e3b]/80">
            <div class="relative w-12 h-[52px] bg-white flex items-center justify-center shadow-inner" style="border-radius: 4px 4px 24px 24px;">
                <i data-lucide="plus" class="w-8 h-8 text-[#064e3b]" stroke-width="4"></i>
            </div>
        </div>
        {% endif %}
      </div>
      <h1 class="text-3xl font-black text-slate-900 tracking-tight font-display mb-1 flex items-baseline gap-1">
        {{ app_settings.app_name }}<span class="text-emerald-800 font-medium text-2xl">-Based</span>
      </h1>
      <h2 class="text-[11.5px] font-black text-amber-500 uppercase tracking-[0.15em] leading-relaxed mt-1">Multidomain Anti-Aging</h2>
      <p class="text-[9.5px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-1">Program</p>
    </div>

    {% if error %}
    <div class="bg-rose-50 text-rose-600 px-5 py-4 rounded-2xl text-sm font-bold mb-6 border border-rose-100 flex items-center gap-2 shadow-sm">
        <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i> {{ error }}
    </div>
    {% endif %}

    <form action="/register" method="POST" class="space-y-4">

      <div class="space-y-2">
        <label class="flex items-center gap-1.5 text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
          <i data-lucide="contact" class="w-3.5 h-3.5 text-[#064e3b]"></i>
          ชื่อ (ไม่ต้องมีนามสกุล)
        </label>
        <input type="text" name="name" required placeholder="ชื่อจริง"
               class="w-full h-[56px] bg-[#F8FAFC] border border-slate-200 rounded-2xl px-5 focus:outline-none focus:border-[#064e3b] focus:bg-white focus:ring-4 focus:ring-[#064e3b]/10 transition-all font-bold text-slate-900 placeholder:text-slate-400 shadow-sm text-[15px]">
      </div>

      <div class="space-y-2">
        <label class="flex items-center gap-1.5 text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
          <i data-lucide="contact-2" class="w-3.5 h-3.5 text-[#064e3b]"></i>
          นามสกุล
        </label>
        <input type="text" name="last_name" required placeholder="นามสกุล"
               class="w-full h-[56px] bg-[#F8FAFC] border border-slate-200 rounded-2xl px-5 focus:outline-none focus:border-[#064e3b] focus:bg-white focus:ring-4 focus:ring-[#064e3b]/10 transition-all font-bold text-slate-900 placeholder:text-slate-400 shadow-sm text-[15px]">
      </div>

      <div class="space-y-2">
        <label class="flex items-center gap-1.5 text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
          <i data-lucide="briefcase" class="w-3.5 h-3.5 text-[#064e3b]"></i>
          อาชีพ
        </label>
        <input type="text" name="occupation" required placeholder="เช่น พยาบาล, แพทย์, ครู"
               class="w-full h-[56px] bg-[#F8FAFC] border border-slate-200 rounded-2xl px-5 focus:outline-none focus:border-[#064e3b] focus:bg-white focus:ring-4 focus:ring-[#064e3b]/10 transition-all font-bold text-slate-900 placeholder:text-slate-400 shadow-sm text-[15px]">
      </div>

      <div class="space-y-2">
        <label class="flex items-center gap-1.5 text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
          <i data-lucide="users" class="w-3.5 h-3.5 text-[#064e3b]"></i>
          สถานะผู้ใช้งาน
        </label>
        <div class="relative">
            <select name="role" required class="w-full h-[56px] bg-[#F8FAFC] border border-slate-200 rounded-2xl px-5 focus:outline-none focus:border-[#064e3b] focus:bg-white focus:ring-4 focus:ring-[#064e3b]/10 transition-all font-bold text-slate-900 appearance-none cursor-pointer shadow-sm text-[14px]">
                <option value="user">ผู้เข้าร่วมวิจัย (Participant)</option>
                <option value="admin">ผู้ดูแลระบบ / นักวิจัย (Admin / Researcher)</option>
            </select>
            <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                <i data-lucide="chevron-down" class="w-5 h-5"></i>
            </div>
        </div>
      </div>

      <div class="space-y-2">
        <label class="flex items-center gap-1.5 text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
          <i data-lucide="user" class="w-3.5 h-3.5 text-[#064e3b]"></i>
          ชื่อผู้ใช้งาน (Username)
        </label>
        <input type="text" name="email" required placeholder="ชื่อผู้ใช้งาน"
               class="w-full h-[56px] bg-[#F8FAFC] border border-slate-200 rounded-2xl px-5 focus:outline-none focus:border-[#064e3b] focus:bg-white focus:ring-4 focus:ring-[#064e3b]/10 transition-all font-bold text-slate-900 placeholder:text-slate-400 shadow-sm text-[15px]">
      </div>

      <div class="space-y-2">
        <label class="flex items-center gap-1.5 text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">
          <i data-lucide="lock" class="w-3.5 h-3.5 text-[#064e3b]"></i>
          รหัสผ่าน
        </label>
        <input type="password" name="password" required placeholder="••••••••"
               class="w-full h-[56px] bg-[#F8FAFC] border border-slate-200 rounded-2xl px-5 focus:outline-none focus:border-[#064e3b] focus:bg-white focus:ring-4 focus:ring-[#064e3b]/10 transition-all font-bold text-slate-900 placeholder:text-slate-400 shadow-sm text-[15px]">
      </div>

      <button type="submit" class="w-full h-[56px] bg-[#064e3b] text-white hover:bg-emerald-900 shadow-xl shadow-emerald-900/20 rounded-2xl font-black tracking-wide transition-all duration-200 active:scale-[0.98] text-[15px] mt-6 flex items-center justify-center gap-2">
        สร้างบัญชีผู้ใช้งาน
        <i data-lucide="user-plus" class="w-4 h-4"></i>
      </button>
    </form>

    <p class="text-center text-xs text-slate-500 mt-8 font-bold flex justify-center items-center gap-1.5">
      มีบัญชีอยู่แล้วใช่หรือไม่?
      <a href="/login" class="text-amber-600 font-black hover:text-amber-500 transition-colors uppercase tracking-wide">เข้าสู่ระบบ</a>
    </p>
  </div>
</div>

<style>
    @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in-up { animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    .animate-float { animation: float 4s ease-in-out infinite; }
    @keyframes pulse-slow { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } }
    .animate-pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }
</style>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
{% endblock %}
